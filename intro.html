<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karen Uchida — Intro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            font-family: 'Montserrat', Arial, sans-serif;
            overflow-x: hidden;
        }

        /* ── NAV ── */
        #navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 40px;
            background: transparent;
            transition: background 0.3s;
        }
        #navbar.scrolled {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
        }
        .nav-logo {
            color: #ff6600;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-decoration: none;
        }
        .nav-links {
            display: flex;
            gap: 28px;
        }
        .nav-links a {
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-decoration: none;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: #ff6600; }

        /* ── TITLE CARD (above the globe) ── */
        #title-card {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 110px 24px 32px;
            background: #000;
        }
        #title-card h1 {
            font-size: clamp(1.6rem, 4vw, 2.6rem);
            font-weight: 300;
            color: #fff;
            letter-spacing: 0.18em;
            margin-bottom: 12px;
        }
        #title-card h1 span { color: #ff6600; }
        #title-card p {
            color: rgba(255,255,255,0.38);
            font-size: 11px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
        }

        /* ── SCROLL WRAPPER ── */
        /* This tall wrapper is what the user actually scrolls through.
           The canvas inside is sticky so it stays pinned to the viewport. */
        #globe-wrapper {
            height: 800vh;
            position: relative;
        }

        #globe-canvas {
            position: sticky;
            top: 0;
            width: 100%;
            height: 100vh;
            display: block;
        }

        /* ── LOCATION LABEL (fixed, centred at bottom) ── */
        #location-label {
            position: fixed;
            bottom: 52px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(255,102,0,0.55);
            padding: 8px 24px;
            border-radius: 99px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: opacity 0.4s;
            white-space: nowrap;
            pointer-events: none;
            z-index: 20;
        }

        /* ── SCROLL HINT ── */
        #scroll-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: opacity 0.8s;
            pointer-events: none;
            z-index: 20;
        }

        /* ── PROGRESS BAR ── */
        #progress-bar {
            position: fixed;
            top: 0; left: 0;
            height: 2px;
            background: #ff6600;
            width: 0%;
            z-index: 60;
            transition: width 0.08s linear;
        }

        /* ── END CARD (appears after scrolling through the full journey) ── */
        #end-card {
            position: relative;
            background: #000;
            text-align: center;
            padding: 80px 24px 100px;
            z-index: 2;
        }
        #end-card p {
            color: rgba(255,255,255,0.35);
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 24px;
        }
        .end-btn {
            display: inline-block;
            padding: 10px 28px;
            border: 1.5px solid #ff6600;
            border-radius: 99px;
            color: #ff6600;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
        }
        .end-btn:hover { background: #ff6600; color: #fff; }
    </style>
</head>
<body>

    <!-- nav -->
    <nav id="navbar">
        <a href="index.html" class="nav-logo">KU</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="index.html#cv">CV</a>
        </div>
    </nav>

    <!-- title above the globe -->
    <div id="title-card">
        <h1>KAREN <span>UCHIDA</span></h1>
        <p>Scroll to travel through my journey</p>
    </div>

    <!-- globe (sticky canvas inside a tall scroll wrapper) -->
    <div id="globe-wrapper">
        <canvas id="globe-canvas"></canvas>
    </div>

    <!-- end section -->
    <div id="end-card">
        <p>Now based in Norwich, UK</p>
        <a href="index.html#cv" class="end-btn">View CV</a>
    </div>

    <!-- UI overlays (outside the wrapper so they stay fixed) -->
    <div id="location-label">Yokohama, Japan</div>
    <div id="scroll-hint">↓ &nbsp; scroll to explore</div>
    <div id="progress-bar"></div>

    <!-- Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.min.js"></script>
    <script>
    // ═══════════════════════════════════════════════════════
    //  HELPERS
    // ═══════════════════════════════════════════════════════

    // Convert lat/lng to a 3D point on a sphere of radius r.
    // Uses the same formula as Three.js SphereGeometry UV mapping:
    //   phi   = (lng + 180) / 360 * 2π   (azimuthal, around Y axis)
    //   theta = (90 - lat) / 180 * π     (polar, from top)
    function ll3d(lat, lng, r) {
        var phi   = ((lng + 180) / 360) * 2 * Math.PI;
        var theta = ((90  - lat) / 180) * Math.PI;
        return new THREE.Vector3(
            -r * Math.cos(phi) * Math.sin(theta),
             r * Math.cos(theta),
             r * Math.sin(phi) * Math.sin(theta)
        );
    }

    // Quaternion that rotates the earth so (lat, lng) faces the camera (+Z).
    function faceQ(lat, lng) {
        var pt = ll3d(lat, lng, 1).normalize();
        return new THREE.Quaternion().setFromUnitVectors(pt, new THREE.Vector3(0, 0, 1));
    }

    // Smooth ease-in-out curve.
    function eio(t) { return t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t; }

    // ═══════════════════════════════════════════════════════
    //  SCENE
    // ═══════════════════════════════════════════════════════
    var canvas   = document.getElementById('globe-canvas');
    var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x00060f);

    var scene  = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 0, 2.8);
    camera.lookAt(0, 0, 0);

    // ── Stars ──
    var sp = new Float32Array(8000 * 3);
    for (var i = 0; i < sp.length; i++) sp[i] = (Math.random() - 0.5) * 300;
    var starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(sp, 3));
    var stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.18 }));
    scene.add(stars);

    // ── Earth ──
    var earthMat = new THREE.MeshPhongMaterial({
        color:    0x1a6699,   // fallback blue if texture fails
        shininess: 15,
        specular:  new THREE.Color(0x223344)
    });
    var earth = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), earthMat);
    scene.add(earth);

    // Load texture — try jsdelivr, fall back to a plain colour
    new THREE.TextureLoader().load(
        'https://cdn.jsdelivr.net/npm/three-globe@2.31.3/example/img/earth-blue-marble.jpg',
        function (tex) {
            earthMat.map   = tex;
            earthMat.color = new THREE.Color(0xffffff); // let the texture drive the colour
            earthMat.needsUpdate = true;
        },
        undefined,
        function () {
            // texture failed — the fallback blue colour is already set, do nothing
        }
    );

    // ── Atmosphere glow ──
    scene.add(new THREE.Mesh(
        new THREE.SphereGeometry(1.07, 64, 64),
        new THREE.MeshBasicMaterial({ color: 0x2255cc, transparent: true, opacity: 0.10, side: THREE.BackSide })
    ));

    // ── Lighting ──
    scene.add(new THREE.AmbientLight(0xffffff, 0.38));
    var sun = new THREE.DirectionalLight(0xfff8ee, 1.25);
    sun.position.set(5, 3, 5);
    scene.add(sun);

    // ── Location markers (added as children of earth → rotate with it) ──
    var PLACES = [
        [35.44, 139.64],   // Yokohama
        [28.46,  77.03],   // Gurgaon
        [51.51,  -0.13],   // London
        [52.21,   0.12],   // Cambridge
        [52.63,   1.30],   // Norwich
    ];
    PLACES.forEach(function (c) {
        var pos = ll3d(c[0], c[1], 1.012);

        var dot = new THREE.Mesh(
            new THREE.SphereGeometry(0.014, 16, 16),
            new THREE.MeshBasicMaterial({ color: 0xff6600 })
        );
        dot.position.copy(pos);
        earth.add(dot);

        var halo = new THREE.Mesh(
            new THREE.SphereGeometry(0.026, 16, 16),
            new THREE.MeshBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0.20 })
        );
        halo.position.copy(pos);
        earth.add(halo);
    });

    // ═══════════════════════════════════════════════════════
    //  WAYPOINTS
    //  [label, lat, lng, cameraZ]
    //  Repeating same lat/lng with different cameraZ = zoom in / zoom out.
    // ═══════════════════════════════════════════════════════
    var WP = [
        ["Yokohama, Japan",  35.44, 139.64, 2.6],  // 0  zoom in
        ["Yokohama, Japan",  35.44, 139.64, 3.8],  // 1  zoom out
        ["Gurgaon, India",   28.46,  77.03, 2.6],  // 2  fly + zoom in
        ["Gurgaon, India",   28.46,  77.03, 3.8],  // 3  zoom out
        ["Yokohama, Japan",  35.44, 139.64, 2.6],  // 4  fly back + zoom in
        ["Yokohama, Japan",  35.44, 139.64, 3.8],  // 5  zoom out
        ["London, UK",       51.51,  -0.13, 2.6],  // 6  fly + zoom in
        ["Cambridge, UK",    52.21,   0.12, 2.9],  // 7  fly
        ["Norwich, UK",      52.63,   1.30, 2.9],  // 8  fly
        ["Norwich, UK",      52.63,   1.30, 2.9],  // 9  hold at end
    ];

    // Pre-compute target quaternions
    var QUATS = WP.map(function (w) { return faceQ(w[1], w[2]); });

    // Set initial earth orientation immediately so it's not black on load
    earth.quaternion.copy(QUATS[0]);

    // ═══════════════════════════════════════════════════════
    //  SCROLL → ANIMATION PROGRESS
    // ═══════════════════════════════════════════════════════
    function getProgress() {
        var wrapper   = document.getElementById('globe-wrapper');
        var maxScroll = wrapper.offsetHeight - window.innerHeight;
        return Math.max(0, Math.min(1, window.scrollY / maxScroll));
    }

    // ═══════════════════════════════════════════════════════
    //  LABEL
    // ═══════════════════════════════════════════════════════
    var labelEl   = document.getElementById('location-label');
    var curLabel  = '';
    var fadeLock  = false;

    function setLabel(name) {
        if (name === curLabel || fadeLock) return;
        fadeLock = true;
        labelEl.style.opacity = '0';
        setTimeout(function () {
            labelEl.textContent = name;
            curLabel = name;
            labelEl.style.opacity = '1';
            fadeLock = false;
        }, 320);
    }

    // ═══════════════════════════════════════════════════════
    //  RENDER LOOP
    // ═══════════════════════════════════════════════════════
    function animate() {
        requestAnimationFrame(animate);

        var progress  = getProgress();
        var numSegs   = WP.length - 1;
        var raw       = progress * numSegs;
        var idx       = Math.min(Math.floor(raw), numSegs - 1);
        var t         = eio(raw - idx);

        // Rotate earth so the current location faces the camera
        var q = new THREE.Quaternion();
        q.slerpQuaternions(QUATS[idx], QUATS[idx + 1], t);
        earth.quaternion.copy(q);

        // Zoom camera in/out along Z
        camera.position.z = WP[idx][3] + (WP[idx + 1][3] - WP[idx][3]) * t;
        camera.lookAt(0, 0, 0);

        // Update label
        setLabel(t < 0.5 ? WP[idx][0] : WP[idx + 1][0]);

        // Progress bar
        document.getElementById('progress-bar').style.width = (progress * 100) + '%';

        // Gentle star drift
        stars.rotation.y += 0.00005;

        renderer.render(scene, camera);
    }

    animate();

    // ═══════════════════════════════════════════════════════
    //  SCROLL HINT FADE
    // ═══════════════════════════════════════════════════════
    window.addEventListener('scroll', function onFirstScroll() {
        if (window.scrollY > 60) {
            document.getElementById('scroll-hint').style.opacity = '0';
            window.removeEventListener('scroll', onFirstScroll);
        }
    });

    // Navbar tint on scroll
    window.addEventListener('scroll', function () {
        document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40);
    });

    // ═══════════════════════════════════════════════════════
    //  RESIZE
    // ═══════════════════════════════════════════════════════
    window.addEventListener('resize', function () {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
    </script>

</body>
</html>
