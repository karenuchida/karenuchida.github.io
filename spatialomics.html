<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spatial Omics — Karen Uchida</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            background: #fafafa;
            color: #111;
            font-family: 'Montserrat', Arial, sans-serif;
            font-size: 14px;
            line-height: 1.6;
        }

        /* ── NAV ── */
        #navbar {
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 48px;
            background: transparent;
            transition: background 0.3s, box-shadow 0.3s;
        }
        #navbar.scrolled {
            background: rgba(255,255,255,0.94);
            backdrop-filter: blur(10px);
            box-shadow: 0 1px 0 #e8e8e8;
        }
        .nav-logo { color: #ff6600; font-size: 17px; font-weight: 600; letter-spacing: 0.1em; text-decoration: none; }
        .nav-links { display: flex; gap: 28px; }
        .nav-links a {
            color: #111; text-decoration: none; font-size: 12px;
            letter-spacing: 0.12em; text-transform: uppercase;
            opacity: 0.45; transition: opacity 0.2s;
        }
        .nav-links a:hover, .nav-links a.active { opacity: 1; color: #ff6600; }

        /* ── PAGE HEADER ── */
        #page-header {
            text-align: center;
            padding: 60px 24px 36px;
        }
        #page-header h1 {
            font-size: clamp(1.4rem, 3.5vw, 2rem);
            font-weight: 300; color: #111;
            letter-spacing: 0.2em; text-transform: uppercase;
        }

        /* ── STATUS ── */
        #status {
            text-align: center; padding: 60px 24px;
            color: #aaa; font-size: 12px; letter-spacing: 0.08em;
        }
        #status.error { color: #c0392b; }
        .spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 2px solid #eee; border-top-color: #ff6600;
            border-radius: 50%; animation: spin 0.7s linear infinite;
            vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ══════════════════════════════════════════
           TIMELINE SECTION
           ══════════════════════════════════════════ */
        #timeline-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px 80px;
            display: none;
        }

        /* Section headings — bigger, mixed case */
        .section-heading {
            font-size: 17px;
            font-weight: 500;
            letter-spacing: 0.04em;
            color: #222;
            text-align: center;
            padding: 0 0 28px;
        }

        /* 3-column grid: [imaging] [year-axis] [sequencing] */
        #timeline-grid {
            display: grid;
            grid-template-columns: 1fr 72px 1fr;
            gap: 0;
            align-items: stretch;
        }

        /* ── Column header labels — bigger, mixed case, no border ── */
        .col-header {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: #333;
            padding: 0 0 6px;
            align-self: start;
        }
        .col-header.img-header { text-align: right; padding-right: 6px; }
        .col-header.seq-header { text-align: left;  padding-left: 6px; }

        /* Colour legend under Imaging-based — horizontal */
        .col-legend-horiz {
            display: flex;
            flex-direction: row;
            gap: 14px;
            justify-content: flex-end;
            padding: 5px 6px 8px 0;
        }
        .col-legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            color: #666;
            letter-spacing: 0.04em;
        }
        .col-legend-swatch {
            width: 11px; height: 11px;
            border-radius: 2px; flex-shrink: 0;
        }
        .col-legend-swatch.amp  { background: #fffce8; border: 1.5px solid #d4b800; }
        .col-legend-swatch.hybr { background: #f8f3ff; border: 1.5px solid #9b7fd4; }

        /* Spacer for year-axis header position */
        .col-header-spacer { align-self: start; padding: 0 0 6px; }

        /* ── Year axis cell ── */
        .year-cell {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 12px;
            min-height: 160px;
        }

        /* Vertical connecting line — slate gray, NO horizontal ticks */
        .year-cell::before {
            content: '';
            position: absolute;
            left: 50%; transform: translateX(-50%);
            top: 0; bottom: 0;
            width: 2px;
            background: rgba(74,85,104,0.22);
            z-index: 0;
        }
        .year-cell.first::before { top: 38px; }
        .year-cell.last::before  { bottom: auto; height: 38px; }

        /* Year circle — slate gray */
        .year-dot {
            position: relative; z-index: 1;
            width: 52px; height: 52px;
            border-radius: 50%;
            background: #4a5568;
            color: #fff;
            font-size: 10px; font-weight: 600;
            display: flex; align-items: center; justify-content: center;
            text-align: center;
            box-shadow: 0 2px 10px rgba(74,85,104,0.25);
            flex-shrink: 0;
        }

        /* ── Paper column cells ── */
        .papers-cell {
            align-self: start;
            padding: 8px 0 10px;
            display: flex;
            flex-direction: column;
            min-height: 160px;
        }
        .img-col { padding-right: 6px; }
        .seq-col { padding-left:  6px; }

        /* ── Paper rows ── */
        .paper-row {
            display: flex;
            align-items: center;
            min-width: 0;
            margin-bottom: 5px;
            flex-shrink: 0;
        }

        /* ─────────────────────────────────────────
           IMAGING (left column)
           NEAR (Breakthrough/Original): pushed RIGHT, close to axis.
           FAR (others): on LEFT, far from axis.
           ───────────────────────────────────────── */
        .paper-row.img-near { justify-content: flex-end; padding-left: 30%; }
        .paper-row.img-near .pcard { flex-shrink: 0; max-width: 240px; }
        .paper-row.img-near .pline { width: 14px; flex-shrink: 0; height: 1px; }

        .paper-row.img-far  { justify-content: flex-start; }
        .paper-row.img-far  .pcard { flex-shrink: 0; max-width: 200px; }
        .paper-row.img-far  .pline { flex-grow: 1; height: 1px; }

        /* ─────────────────────────────────────────
           SEQUENCING (right column)
           NEAR: line then card, left-aligned (close to axis).
           FAR:  growing line then card, right-aligned.
           ───────────────────────────────────────── */
        .paper-row.seq-near { justify-content: flex-start; padding-right: 30%; }
        .paper-row.seq-near .pline { width: 14px; flex-shrink: 0; height: 1px; order: 1; }
        .paper-row.seq-near .pcard { flex-shrink: 0; max-width: 240px; order: 2; }

        .paper-row.seq-far  { justify-content: flex-end; }
        .paper-row.seq-far  .pline { flex-grow: 1; height: 1px; order: 1; }
        .paper-row.seq-far  .pcard { flex-shrink: 0; max-width: 200px; order: 2; }

        /* ── Branch line colours ── */
        .paper-row.img-near.amplification .pline { background: rgba(212,184,0,0.55); }
        .paper-row.img-far.amplification  .pline { background: linear-gradient(to right, transparent, rgba(212,184,0,0.4)); }
        .paper-row.img-near.hybridisation .pline { background: rgba(155,127,212,0.55); }
        .paper-row.img-far.hybridisation  .pline { background: linear-gradient(to right, transparent, rgba(155,127,212,0.4)); }
        .paper-row.seq-near.sequencing    .pline { background: rgba(150,150,150,0.4); }
        .paper-row.seq-far.sequencing     .pline { background: linear-gradient(to left, transparent, rgba(150,150,150,0.35)); }

        /* ── Paper cards — uniform border ── */
        .pcard {
            border-radius: 5px;
            padding: 6px 10px 7px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            transition: box-shadow 0.18s;
            min-width: 0;
        }
        .pcard:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.10); }
        .pcard.amplification { background: #fffce8; border: 1.5px solid #d4b800; }
        .pcard.hybridisation { background: #f8f3ff; border: 1.5px solid #9b7fd4; }
        .pcard.sequencing    { background: #ffffff; border: 1.5px solid #c8c8c8; }

        .paper-method   { font-weight: 600; font-size: 11.5px; color: #111; margin-bottom: 2px; line-height: 1.3; }
        .paper-organism { font-size: 10px; color: #888; margin-bottom: 3px; font-style: italic; }
        .paper-doi {
            display: block; font-size: 10px;
            text-decoration: none; word-break: break-all;
            opacity: 0.75; transition: opacity 0.2s;
        }
        .pcard.amplification .paper-doi { color: #a08000; }
        .pcard.hybridisation .paper-doi { color: #7a5bc4; }
        .pcard.sequencing    .paper-doi { color: #666; }
        .paper-doi:hover { opacity: 1; text-decoration: underline; }

        /* ══════════════════════════════════════════
           BUBBLE CHART SECTION
           ══════════════════════════════════════════ */
        #bubble-section {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 24px 100px;
            text-align: center;
            display: none;
        }
        #bubble-chart svg {
            width: 100%; max-width: 700px;
            display: block; margin: 0 auto;
            overflow: visible;
        }

        /* ── Responsive ── */
        @media (max-width: 720px) {
            #navbar { padding: 14px 18px; }
            #timeline-wrap { padding: 0 12px 60px; }
            #timeline-grid { grid-template-columns: 1fr 50px 1fr; }
            .paper-row.img-near { padding-left: 0; }
            .paper-row.seq-near { padding-right: 0; }
            .paper-row.img-near .pcard, .paper-row.img-far  .pcard,
            .paper-row.seq-near .pcard, .paper-row.seq-far  .pcard { max-width: 130px; }
            .year-dot { width: 40px; height: 40px; font-size: 8.5px; }
        }
    </style>
</head>
<body>

<!-- NAV -->
<nav id="navbar">
    <a href="index.html" class="nav-logo">KU</a>
    <div class="nav-links">
        <a href="intro.html">Intro</a>
        <a href="index.html#cv">CV</a>
        <a href="spatialomics.html" class="active">Spatial Omics</a>
    </div>
</nav>

<!-- PAGE HEADER -->
<div id="page-header">
    <h1>Spatial Omics</h1>
</div>

<!-- LOADING -->
<div id="status"><span class="spinner"></span> Loading from spreadsheet…</div>

<!-- TIMELINE -->
<div id="timeline-wrap">
    <p class="section-heading">Timeline</p>
    <div id="timeline-grid"></div>
</div>

<!-- BUBBLE CHART -->
<div id="bubble-section">
    <p class="section-heading">Sample type</p>
    <div id="bubble-chart"></div>
</div>

<script>
// ═══════════════════════════════════
//  CONFIG
// ═══════════════════════════════════
var SHEET_ID = '1GDGEbKghH3nxXYz98v8coWwhkBjoq7izMQlkgM1wEV8';
var GVIZ_URL = 'https://docs.google.com/spreadsheets/d/'
             + SHEET_ID + '/gviz/tq?tqx=out:json';

// ═══════════════════════════════════
//  HELPERS
// ═══════════════════════════════════

// Parse year AND month from a gviz date cell.
// gviz uses JS-style 0-indexed months: Date(2023,5,15) = June 15 2023.
function parseDate(cell) {
    var out = { year: null, month: null };
    if (!cell || cell.v == null) return out;
    if (typeof cell.v === 'string') {
        var dm = cell.v.match(/Date\((\d+),(\d+)/);
        if (dm) {
            out.year  = parseInt(dm[1]);
            out.month = parseInt(dm[2]) + 1; // convert 0-indexed → 1-indexed (1=Jan, 12=Dec)
            return out;
        }
    }
    if (cell.f) {
        var m = String(cell.f).match(/\d{4}/);
        if (m) { out.year = parseInt(m[0]); return out; }
    }
    var n = parseInt(cell.v);
    if (!isNaN(n) && n > 1900 && n < 2200) { out.year = n; return out; }
    return out;
}

function cellStr(cell) {
    return (cell && cell.v != null) ? String(cell.v).trim() : '';
}

function esc(s) {
    return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Case-insensitive column lookup — tries multiple name variants
function findCol(cols) {
    var names = Array.prototype.slice.call(arguments, 1);
    for (var i = 0; i < names.length; i++) {
        var t = names[i].toLowerCase().replace(/\s+/g,' ').trim();
        for (var j = 0; j < cols.length; j++) {
            if (cols[j].toLowerCase().replace(/\s+/g,' ').trim() === t) return j;
        }
    }
    return -1;
}

function getCell(row, idx) {
    return (idx >= 0 && row.c && row.c[idx]) ? row.c[idx] : null;
}

// ═══════════════════════════════════
//  RENDER one paper card
// ═══════════════════════════════════
function paperCard(p) {
    var doi        = p.doi;
    var doiDisplay = doi.replace(/^https?:\/\/(dx\.)?doi\.org\//i, '');
    return '<div class="pcard ' + p.cardType + '">'
         + '<div class="paper-method">' + esc(p.method) + '</div>'
         + (p.organism ? '<div class="paper-organism">' + esc(p.organism) + '</div>' : '')
         + (doi ? '<a class="paper-doi" href="' + doi.replace(/"/g,'%22') + '"'
                + ' target="_blank" rel="noopener">' + esc(doiDisplay) + '</a>' : '')
         + '</div>';
}

// ═══════════════════════════════════
//  RENDER one column's papers for a year,
//  with month-based vertical spacing.
//
//  Descending timeline: Dec (month 12) at top,
//  Jan (month 1) at bottom within each year section.
//  Papers sorted by month descending, with proportional
//  spacers inserted between them.
// ═══════════════════════════════════
var Y_SCALE   = 160; // pixel spread per year (= min-height of paper cell)
var CARD_H    = 64;  // estimated card height + margin (px)

function renderPapers(papers, side) {
    if (papers.length === 0) return '';

    // Sort by month descending (Dec first = top of section)
    var sorted = papers.slice().sort(function(a, b) {
        return (b.month || 6) - (a.month || 6);
    });

    var html = '';
    var runningY = 0;

    sorted.forEach(function(p) {
        // Target Y offset from top of year section
        var m       = p.month || 6;
        var targetY = Math.round((12 - m) / 11 * Y_SCALE);

        // Insert spacer if there is a gap to fill
        var spacer = Math.max(0, targetY - runningY);
        if (spacer > 2) {
            html += '<div style="height:' + spacer + 'px;flex-shrink:0"></div>';
            runningY += spacer;
        }

        var prox = p.isNear ? 'near' : 'far';
        html += '<div class="paper-row ' + side + '-' + prox + ' ' + p.cardType + '">'
              + paperCard(p)
              + '<div class="pline"></div>'
              + '</div>';

        runningY += CARD_H;
    });

    return html;
}

// ═══════════════════════════════════
//  BUILD TIMELINE
// ═══════════════════════════════════
function buildTimeline(rows) {
    var imgRows = rows.filter(function(r) { return r.methodType === 'imaging'; });
    var seqRows = rows.filter(function(r) { return r.methodType === 'sequencing'; });

    function groupByYear(list) {
        var map = {};
        list.forEach(function(r) {
            var y = r.year || 'unknown';
            if (!map[y]) map[y] = [];
            map[y].push(r);
        });
        return map;
    }

    var imgByYear = groupByYear(imgRows);
    var seqByYear = groupByYear(seqRows);

    var yearSet = {};
    [imgByYear, seqByYear].forEach(function(m) {
        Object.keys(m).forEach(function(y) { if (y !== 'unknown') yearSet[y] = true; });
    });
    // Descending: newest first
    var years = Object.keys(yearSet).map(Number).sort(function(a,b){ return b - a; });

    // Column headers: legend sits under "Imaging-based", horizontal
    var html = '<div style="align-self:start;text-align:right;padding-right:6px">'
             +   '<div class="col-header">Imaging-based</div>'
             +   '<div class="col-legend-horiz">'
             +     '<div class="col-legend-item"><span class="col-legend-swatch amp"></span>Amplification</div>'
             +     '<div class="col-legend-item"><span class="col-legend-swatch hybr"></span>Hybridisation</div>'
             +   '</div>'
             + '</div>'
             + '<div class="col-header-spacer"></div>'
             + '<div class="col-header seq-header">Sequencing-based</div>';

    years.forEach(function(year, idx) {
        var isFirst = idx === 0;
        var isLast  = idx === years.length - 1;
        var yKey    = String(year);

        html += '<div class="papers-cell img-col">'
              + renderPapers(imgByYear[yKey] || [], 'img')
              + '</div>';

        html += '<div class="year-cell'
              + (isFirst ? ' first' : '')
              + (isLast  ? ' last'  : '') + '">'
              + '<div class="year-dot">' + year + '</div>'
              + '</div>';

        html += '<div class="papers-cell seq-col">'
              + renderPapers(seqByYear[yKey] || [], 'seq')
              + '</div>';
    });

    document.getElementById('timeline-grid').innerHTML = html;
    document.getElementById('timeline-wrap').style.display = 'block';
}

// ═══════════════════════════════════
//  BUILD BUBBLE CHART
// ═══════════════════════════════════
function buildBubbleChart(rows) {
    var counts = {};
    rows.forEach(function(r) {
        if (!r.organism) return;
        var raw = r.organism.toLowerCase();
        var key = /animal/i.test(raw)  ? 'Animals'
                : /plant/i.test(raw)   ? 'Plants'
                : /microb/i.test(raw)  ? 'Microbes'
                : null;
        if (key) counts[key] = (counts[key] || 0) + 1;
    });

    var items = [
        { label: 'Animals',  count: counts['Animals']  || 0, fill: '#fff0e6', stroke: '#e07840' },
        { label: 'Plants',   count: counts['Plants']   || 0, fill: '#edf7ed', stroke: '#52a852' },
        { label: 'Microbes', count: counts['Microbes'] || 0, fill: '#ede7f6', stroke: '#8264c8' }
    ];

    var maxCount = Math.max.apply(null, items.map(function(d) { return d.count; })) || 1;
    var maxR = 82, minR = 18;

    items.forEach(function(d) {
        d.r = d.count > 0 ? Math.max(minR, Math.round(maxR * Math.sqrt(d.count / maxCount))) : minR;
    });

    var W = 700, centerY = 100;
    var spacing = W / (items.length + 1);
    var H = centerY + maxR + 50;

    var svg = ['<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg" font-family="Montserrat,Arial,sans-serif">'];

    items.forEach(function(d, i) {
        var cx = Math.round(spacing * (i + 1));
        svg.push('<circle cx="' + cx + '" cy="' + centerY + '" r="' + d.r + '"'
            + ' fill="' + d.fill + '" stroke="' + d.stroke + '" stroke-width="1.5"/>');
        if (d.count > 0) {
            svg.push('<text x="' + cx + '" y="' + (centerY + 5) + '"'
                + ' text-anchor="middle" font-size="13" font-weight="600" fill="' + d.stroke + '">'
                + d.count + '</text>');
        }
        svg.push('<text x="' + cx + '" y="' + (centerY + d.r + 20) + '"'
            + ' text-anchor="middle" font-size="11" font-weight="500" letter-spacing="0.5" fill="#555">'
            + d.label + '</text>');
    });

    svg.push('</svg>');

    document.getElementById('bubble-chart').innerHTML = svg.join('');
    document.getElementById('bubble-section').style.display = 'block';
}

// ═══════════════════════════════════
//  FETCH
// ═══════════════════════════════════
fetch(GVIZ_URL)
    .then(function(r) { return r.text(); })
    .then(function(text) {
        var start = text.indexOf('(') + 1;
        var end   = text.lastIndexOf(')');
        if (start <= 0 || end <= start) throw new Error('Could not parse response');

        var data = JSON.parse(text.substring(start, end));
        var cols = data.table.cols.map(function(c) { return c.label; });

        // Robust case-insensitive column lookups
        var iDate   = findCol(cols, 'date published', 'date', 'year', 'published');
        var iLink   = findCol(cols, 'link', 'doi', 'url', 'paper link');
        var iMethod = findCol(cols, 'method', 'method name', 'technique', 'name');
        var iMType  = findCol(cols, 'method type', 'type', 'category');
        var iIType  = findCol(cols, 'imaging type', 'imaging subtype', 'subtype', 'imaging');
        var iTag    = findCol(cols, 'tag', 'tags', 'label', 'status', 'highlight');
        var iOrg    = findCol(cols, 'organism type', 'organism', 'species', 'sample type', 'sample');

        var rows = (data.table.rows || [])
            .filter(function(r) { return r && r.c; })
            .map(function(r) {
                var dateInfo = parseDate(getCell(r, iDate));
                var mt  = cellStr(getCell(r, iMType)).toLowerCase();
                var it  = cellStr(getCell(r, iIType)).toLowerCase();
                var tag = cellStr(getCell(r, iTag));

                var cardType;
                if (mt === 'imaging') {
                    cardType = (it.indexOf('hybridis') !== -1 || it.indexOf('hybridiz') !== -1)
                             ? 'hybridisation' : 'amplification';
                } else {
                    cardType = 'sequencing';
                }

                return {
                    year:       dateInfo.year,
                    month:      dateInfo.month,
                    doi:        cellStr(getCell(r, iLink)),
                    method:     cellStr(getCell(r, iMethod)),
                    methodType: mt,
                    cardType:   cardType,
                    tag:        tag,
                    isNear:     /breakthrough|original/i.test(tag),
                    organism:   cellStr(getCell(r, iOrg))
                };
            })
            .filter(function(r) { return r.method && r.methodType; });

        document.getElementById('status').style.display = 'none';
        buildTimeline(rows);
        buildBubbleChart(rows);
    })
    .catch(function(err) {
        var s = document.getElementById('status');
        s.className = 'error';
        s.innerHTML = '&#9888; Could not load data.<br>'
            + '<small>Make sure the Google Sheet is shared as "Anyone with the link can view".</small><br>'
            + '<small style="opacity:0.6">' + esc(err.message) + '</small>';
    });

// Navbar scroll tint
window.addEventListener('scroll', function() {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40);
});
</script>

</body>
</html>
