<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spatial Omics — Karen Uchida</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ── RESET & BASE ─────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            background: #fff;
            color: #111;
            font-family: 'Montserrat', Arial, sans-serif;
            font-size: 14px;
            line-height: 1.6;
        }

        /* ── NAV ──────────────────────────────────── */
        #navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 48px;
            background: transparent;
            transition: background 0.3s, box-shadow 0.3s;
        }
        #navbar.scrolled {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(10px);
            box-shadow: 0 1px 0 #e8e8e8;
        }
        .nav-logo {
            color: #ff6600;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-decoration: none;
        }
        .nav-links { display: flex; gap: 28px; }
        .nav-links a {
            color: #111;
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            opacity: 0.45;
            transition: opacity 0.2s;
        }
        .nav-links a:hover { opacity: 1; }

        /* ── PAGE HEADER ──────────────────────────── */
        #page-header {
            text-align: center;
            padding: 64px 24px 32px;
        }
        #page-header h1 {
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 300;
            color: #ff6600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }
        #page-header p {
            margin-top: 10px;
            color: #888;
            font-size: 12px;
            letter-spacing: 0.12em;
        }

        /* ── TREE SVG ─────────────────────────────── */
        /* The SVG draws the branching structure above the paper columns.
           Its viewBox is 900×200 and maps directly to the 3-column grid below. */
        #tree-svg-wrap {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 24px;
        }
        #tree-svg {
            width: 100%;
            display: block;
            overflow: visible;
        }

        /* ── PAPER COLUMNS ────────────────────────── */
        #columns-wrap {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 24px 80px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            align-items: start;
        }

        .col-header {
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #ff6600;
            border-bottom: 2px solid #ff6600;
            padding-bottom: 8px;
            margin-bottom: 16px;
        }

        /* ── PAPER CARDS ──────────────────────────── */
        .paper-card {
            background: #fff;
            border-left: 3px solid #ff6600;
            border-radius: 0 8px 8px 0;
            padding: 12px 14px;
            margin-bottom: 12px;
            box-shadow: 0 1px 8px rgba(0,0,0,0.07);
            transition: box-shadow 0.2s;
        }
        .paper-card:hover { box-shadow: 0 3px 16px rgba(255,102,0,0.15); }

        .paper-year {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            color: #fff;
            background: #ff6600;
            padding: 1px 8px;
            border-radius: 99px;
            letter-spacing: 0.08em;
            margin-bottom: 5px;
        }
        .paper-method {
            font-size: 13px;
            font-weight: 600;
            color: #111;
            line-height: 1.3;
            margin-bottom: 3px;
        }
        .paper-author {
            font-size: 11px;
            color: #888;
            margin-bottom: 5px;
        }
        .paper-doi {
            display: block;
            font-size: 10px;
            color: #ff6600;
            text-decoration: none;
            word-break: break-all;
            opacity: 0.75;
            transition: opacity 0.2s;
        }
        .paper-doi:hover { opacity: 1; text-decoration: underline; }

        /* ── LOADING / ERROR ──────────────────────── */
        #status {
            text-align: center;
            padding: 60px 24px;
            color: #888;
            font-size: 13px;
            letter-spacing: 0.08em;
        }
        #status.error { color: #c0392b; }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #eee;
            border-top-color: #ff6600;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── RESPONSIVE ───────────────────────────── */
        @media (max-width: 700px) {
            #navbar { padding: 14px 20px; }
            #columns-wrap { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav id="navbar">
        <a href="index.html" class="nav-logo">KU</a>
        <div class="nav-links">
            <a href="intro.html">Intro</a>
            <a href="index.html#cv">CV</a>
            <a href="spatialomics.html" style="opacity:1;color:#ff6600">Spatial Omics</a>
        </div>
    </nav>

    <!-- HEADER -->
    <div id="page-header">
        <h1>Spatial Transcriptomics</h1>
        <p>Timeline of methods · updates automatically from the source spreadsheet</p>
    </div>

    <!-- LOADING STATE -->
    <div id="status"><span class="spinner"></span> Loading data from spreadsheet…</div>

    <!-- TREE + COLUMNS (hidden until data loads) -->
    <div id="tree-svg-wrap" style="display:none">
        <!--
            SVG Tree Diagram
            viewBox is 900 wide, matching the 3-column grid (each col = 300 units).
            Column centres: col-1 = 150, col-2 = 450, col-3 = 750
            Imaging spans cols 1-2: centre = 300
            Sequencing is col-3: centre = 750
            Root spans all: centre = 450
        -->
        <svg id="tree-svg" viewBox="0 0 900 195" preserveAspectRatio="xMidYMid meet"
             xmlns="http://www.w3.org/2000/svg">

            <!-- ── Connecting lines ── -->
            <!-- Root → Imaging -->
            <line x1="450" y1="42" x2="300" y2="80" stroke="#ff6600" stroke-width="1.5" stroke-opacity="0.35"/>
            <!-- Root → Sequencing -->
            <line x1="450" y1="42" x2="750" y2="80" stroke="#ff6600" stroke-width="1.5" stroke-opacity="0.35"/>
            <!-- Imaging → Amplification -->
            <line x1="300" y1="116" x2="150" y2="155" stroke="#ff6600" stroke-width="1.5" stroke-opacity="0.35"/>
            <!-- Imaging → Hybridisation -->
            <line x1="300" y1="116" x2="450" y2="155" stroke="#ff6600" stroke-width="1.5" stroke-opacity="0.35"/>
            <!-- Sequencing down to paper columns (dashed) -->
            <line x1="750" y1="116" x2="750" y2="155" stroke="#ff6600" stroke-width="1.5" stroke-opacity="0.2" stroke-dasharray="4 3"/>

            <!-- ── Root node ── -->
            <rect x="155" y="8" width="590" height="34" rx="6"
                  fill="none" stroke="#ff6600" stroke-width="1.8"/>
            <text x="450" y="30" text-anchor="middle"
                  fill="#ff6600" font-family="Montserrat,Arial,sans-serif"
                  font-size="15" font-weight="500" letter-spacing="2">
                SPATIAL TRANSCRIPTOMICS
            </text>

            <!-- ── Imaging node ── -->
            <rect x="120" y="80" width="360" height="36" rx="6"
                  fill="#fff7f2" stroke="#ff6600" stroke-width="1.6"/>
            <text x="300" y="103" text-anchor="middle"
                  fill="#ff6600" font-family="Montserrat,Arial,sans-serif"
                  font-size="14" font-weight="500" letter-spacing="1.5">
                IMAGING
            </text>

            <!-- ── Sequencing node ── -->
            <rect x="620" y="80" width="260" height="36" rx="6"
                  fill="#fff7f2" stroke="#ff6600" stroke-width="1.6"/>
            <text x="750" y="103" text-anchor="middle"
                  fill="#ff6600" font-family="Montserrat,Arial,sans-serif"
                  font-size="14" font-weight="500" letter-spacing="1.5">
                SEQUENCING
            </text>

            <!-- ── Amplification node ── -->
            <rect x="22" y="155" width="256" height="34" rx="6"
                  fill="#fff7f2" stroke="#ff6600" stroke-width="1.4"/>
            <text x="150" y="177" text-anchor="middle"
                  fill="#ff6600" font-family="Montserrat,Arial,sans-serif"
                  font-size="12.5" font-weight="500" letter-spacing="1">
                AMPLIFICATION
            </text>

            <!-- ── Hybridisation node ── -->
            <rect x="322" y="155" width="256" height="34" rx="6"
                  fill="#fff7f2" stroke="#ff6600" stroke-width="1.4"/>
            <text x="450" y="177" text-anchor="middle"
                  fill="#ff6600" font-family="Montserrat,Arial,sans-serif"
                  font-size="12.5" font-weight="500" letter-spacing="1">
                HYBRIDISATION
            </text>

            <!-- ── Sequencing column placeholder (aligned with col 3) ── -->
            <rect x="622" y="155" width="256" height="34" rx="6"
                  fill="#fff7f2" stroke="#ff6600" stroke-width="1.4" stroke-opacity="0.3"/>

        </svg>
    </div>

    <div id="columns-wrap" style="display:none">
        <div>
            <div class="col-header">Amplification</div>
            <div id="col-amp"></div>
        </div>
        <div>
            <div class="col-header">Hybridisation</div>
            <div id="col-hybr"></div>
        </div>
        <div>
            <div class="col-header">Sequencing</div>
            <div id="col-seq"></div>
        </div>
    </div>

    <script>
    // ═══════════════════════════════════════════════════════
    //  CONFIG
    // ═══════════════════════════════════════════════════════
    var SHEET_ID = '1GDGEbKghH3nxXYz98v8coWwhkBjoq7izMQlkgM1wEV8';
    var GVIZ_URL = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID
                + '/gviz/tq?tqx=out:json';

    // ═══════════════════════════════════════════════════════
    //  PARSE YEAR from gviz date cell
    //  gviz returns dates as: { v: "Date(2026,2,12)", f: "2026" }
    // ═══════════════════════════════════════════════════════
    function parseYear(cell) {
        if (!cell || cell.v == null) return null;
        // Formatted value first (most reliable)
        if (cell.f) {
            var m = String(cell.f).match(/\d{4}/);
            if (m) return parseInt(m[0]);
        }
        // Parse Date(year, ...) string
        if (typeof cell.v === 'string') {
            var dm = cell.v.match(/Date\((\d{4})/);
            if (dm) return parseInt(dm[1]);
        }
        // Plain number
        var n = parseInt(cell.v);
        if (!isNaN(n) && n > 1900 && n < 2100) return n;
        return null;
    }

    function cellVal(cell) {
        if (!cell || cell.v == null) return '';
        return String(cell.v).trim();
    }

    // ═══════════════════════════════════════════════════════
    //  RENDER one paper card
    // ═══════════════════════════════════════════════════════
    function paperCard(row) {
        var year   = row.year  ? String(row.year) : '';
        var method = row.method || '—';
        var author = row.author || '';
        var doi    = row.doi || '';
        // Show DOI as the clean identifier (strip https://doi.org/ prefix for display)
        var doiDisplay = doi.replace(/^https?:\/\/(dx\.)?doi\.org\//i, '');

        return '<div class="paper-card">'
            + (year ? '<span class="paper-year">' + year + '</span>' : '')
            + '<div class="paper-method">' + escHtml(method) + '</div>'
            + (author ? '<div class="paper-author">' + escHtml(author) + '</div>' : '')
            + (doi ? '<a class="paper-doi" href="' + escAttr(doi) + '" target="_blank" rel="noopener">'
                   + escHtml(doiDisplay) + '</a>' : '')
            + '</div>';
    }

    function escHtml(s) {
        return String(s)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escAttr(s) { return String(s).replace(/"/g,'%22'); }

    // ═══════════════════════════════════════════════════════
    //  RENDER a column of papers (oldest → newest, top → bottom)
    // ═══════════════════════════════════════════════════════
    function renderColumn(id, papers) {
        var el = document.getElementById(id);
        if (!papers.length) {
            el.innerHTML = '<p style="color:#ccc;font-size:12px;text-align:center;padding:20px 0">No entries yet</p>';
            return;
        }
        el.innerHTML = papers.map(paperCard).join('');
    }

    // ═══════════════════════════════════════════════════════
    //  FETCH & BUILD
    // ═══════════════════════════════════════════════════════
    fetch(GVIZ_URL)
        .then(function(r) { return r.text(); })
        .then(function(text) {
            // Strip the JSONP wrapper: /*O_o*/\ngoogle.visualization.Query.setResponse({...});
            var start = text.indexOf('(') + 1;
            var end   = text.lastIndexOf(')');
            if (start <= 0 || end <= start) throw new Error('Unexpected response format');

            var data  = JSON.parse(text.substring(start, end));
            var table = data.table;
            var cols  = table.cols.map(function(c) { return c.label; });

            // Build row objects
            var rows = (table.rows || [])
                .filter(function(r) { return r && r.c; })
                .map(function(r) {
                    var obj = {};
                    cols.forEach(function(label, i) {
                        obj[label] = r.c[i] || null;
                    });
                    return {
                        year:       parseYear(obj['Date published']),
                        doi:        cellVal(obj['Link']),
                        author:     cellVal(obj['First author']),
                        method:     cellVal(obj['Method']),
                        methodType: cellVal(obj['Method type']),
                        imagingType:cellVal(obj['Imaging type'])
                    };
                })
                .filter(function(r) { return r.method; }); // skip blank rows

            // Sort oldest → newest (null years go to the bottom)
            rows.sort(function(a, b) {
                if (a.year == null && b.year == null) return 0;
                if (a.year == null) return 1;
                if (b.year == null) return -1;
                return a.year - b.year;
            });

            // Split into three columns
            var amp  = rows.filter(function(r) {
                return r.methodType.toLowerCase() === 'imaging'
                    && r.imagingType.toLowerCase() === 'amplification';
            });
            var hybr = rows.filter(function(r) {
                return r.methodType.toLowerCase() === 'imaging'
                    && r.imagingType.toLowerCase() === 'hybridisation';
            });
            var seq  = rows.filter(function(r) {
                return r.methodType.toLowerCase() === 'sequencing';
            });

            // Render
            renderColumn('col-amp',  amp);
            renderColumn('col-hybr', hybr);
            renderColumn('col-seq',  seq);

            // Show content, hide spinner
            document.getElementById('status').style.display      = 'none';
            document.getElementById('tree-svg-wrap').style.display = 'block';
            document.getElementById('columns-wrap').style.display  = 'grid';
        })
        .catch(function(err) {
            var s = document.getElementById('status');
            s.className = 'error';
            s.innerHTML = '⚠ Could not load data. Make sure the Google Sheet is shared publicly (Anyone with the link can view).<br><small>' + err.message + '</small>';
        });

    // ─── Navbar scroll tint ───────────────────────────────
    window.addEventListener('scroll', function () {
        document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40);
    });
    </script>

</body>
</html>
