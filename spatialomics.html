<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spatial Omics — Karen Uchida</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            background: #fafafa;
            color: #111;
            font-family: 'Montserrat', Arial, sans-serif;
            font-size: 14px;
            line-height: 1.6;
        }

        /* ── NAV ── */
        #navbar {
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 48px;
            background: transparent;
            transition: background 0.3s, box-shadow 0.3s;
        }
        #navbar.scrolled {
            background: rgba(255,255,255,0.94);
            backdrop-filter: blur(10px);
            box-shadow: 0 1px 0 #e8e8e8;
        }
        .nav-logo { color: #ff6600; font-size: 17px; font-weight: 600; letter-spacing: 0.1em; text-decoration: none; }
        .nav-links { display: flex; gap: 28px; }
        .nav-links a {
            color: #111; text-decoration: none; font-size: 12px;
            letter-spacing: 0.12em; text-transform: uppercase;
            opacity: 0.45; transition: opacity 0.2s;
        }
        .nav-links a:hover, .nav-links a.active { opacity: 1; color: #ff6600; }

        /* ── PAGE HEADER ── */
        #page-header {
            text-align: center;
            padding: 60px 24px 28px;
        }
        #page-header h1 {
            font-size: clamp(1.4rem, 3.5vw, 2rem);
            font-weight: 300; color: #111;
            letter-spacing: 0.2em; text-transform: uppercase;
            margin-bottom: 16px;
        }

        /* Legend */
        .legend {
            display: inline-flex;
            gap: 18px;
            align-items: center;
            font-size: 11px;
            letter-spacing: 0.07em;
            color: #777;
            flex-wrap: wrap;
            justify-content: center;
        }
        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .legend-swatch {
            display: inline-block;
            width: 14px; height: 14px;
            border-radius: 3px;
            flex-shrink: 0;
        }
        .legend-swatch.amp  { background: #fffce8; border: 1.5px solid #d4b800; }
        .legend-swatch.hybr { background: #f8f3ff; border: 1.5px solid #9b7fd4; }
        .legend-swatch.seq  { background: #ffffff; border: 1.5px solid #c8c8c8; }

        /* ── STATUS ── */
        #status {
            text-align: center; padding: 60px 24px;
            color: #aaa; font-size: 12px; letter-spacing: 0.08em;
        }
        #status.error { color: #c0392b; }
        .spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 2px solid #eee; border-top-color: #ff6600;
            border-radius: 50%; animation: spin 0.7s linear infinite;
            vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ══════════════════════════════════════════
           TIMELINE LAYOUT
           3 columns: [imaging] [year-axis] [sequencing]
           Year cells: align-self stretch (continuous line).
           Paper cells: align-self start.
           ══════════════════════════════════════════ */
        #timeline-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px 100px;
            display: none;
        }

        #timeline-grid {
            display: grid;
            grid-template-columns: 1fr 72px 1fr;
            gap: 0;
            align-items: stretch;
        }

        /* ── Column header labels ── */
        .col-header {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #555;
            padding: 24px 0 14px;
            align-self: start;
            border-bottom: 1px solid rgba(0,0,0,0.07);
            margin-bottom: 6px;
        }
        .col-header.img-header { text-align: right; padding-right: 4px; }
        .col-header.seq-header { text-align: left;  padding-left:  4px; }
        .col-header-spacer {
            align-self: start;
            padding: 24px 0 14px;
            border-bottom: 1px solid rgba(0,0,0,0.07);
            margin-bottom: 6px;
        }

        /* ── Year axis cell ── */
        .year-cell {
            grid-column: 2;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 12px;
        }

        /* Vertical connecting line — slate gray */
        .year-cell::before {
            content: '';
            position: absolute;
            left: 50%; transform: translateX(-50%);
            top: 0; bottom: 0;
            width: 2px;
            background: rgba(74,85,104,0.22);
            z-index: 0;
        }
        .year-cell.first::before { top: 38px; }
        .year-cell.last::before  { bottom: auto; height: 38px; }

        /* Faint horizontal tick at dot centre */
        .year-cell::after {
            content: '';
            position: absolute;
            left: -14px; right: -14px;
            top: 38px;
            height: 1px;
            background: rgba(74,85,104,0.1);
            z-index: 0;
        }

        /* Year circle — slate gray */
        .year-dot {
            position: relative; z-index: 1;
            width: 52px; height: 52px;
            border-radius: 50%;
            background: #4a5568;
            color: #fff;
            font-size: 10px; font-weight: 600;
            letter-spacing: 0.02em;
            display: flex; align-items: center; justify-content: center;
            text-align: center; line-height: 1.25;
            box-shadow: 0 2px 10px rgba(74,85,104,0.25);
            flex-shrink: 0;
        }

        /* ── Paper column cells ── */
        .papers-cell {
            align-self: start;
            padding: 8px 0 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .img-col { padding-right: 6px; }
        .seq-col { padding-left:  6px; }

        /* ── Paper rows ── */
        .paper-row {
            display: flex;
            align-items: center;
            min-width: 0;
            margin-bottom: 5px;
        }

        /* ─────────────────────────────────────────
           IMAGING (left column)

           NEAR (Breakthrough/Original):
             card pushed RIGHT, close to year axis.
             padding-left: 30% ensures visual gap on far left.
             [card][short line] → flex-end

           FAR (everything else):
             card on LEFT, growing line reaches toward axis.
             [card][growing fading line] → flex-start
           ───────────────────────────────────────── */
        .paper-row.img-near {
            justify-content: flex-end;
            padding-left: 28%;
        }
        .paper-row.img-near .pcard { flex-shrink: 0; max-width: 240px; }
        .paper-row.img-near .pline { width: 14px; flex-shrink: 0; }

        .paper-row.img-far {
            justify-content: flex-start;
        }
        .paper-row.img-far .pcard { flex-shrink: 0; max-width: 200px; }
        .paper-row.img-far .pline { flex-grow: 1; }

        /* ─────────────────────────────────────────
           SEQUENCING (right column)

           NEAR: card on LEFT (close to year axis).
             [short line][card] → flex-start, line first via order

           FAR: card on RIGHT (far from axis).
             [growing fading line][card] → flex-end, line first via order
           ───────────────────────────────────────── */
        .paper-row.seq-near {
            justify-content: flex-start;
            padding-right: 28%;
        }
        .paper-row.seq-near .pline { width: 14px; flex-shrink: 0; order: 1; }
        .paper-row.seq-near .pcard { flex-shrink: 0; max-width: 240px; order: 2; }

        .paper-row.seq-far {
            justify-content: flex-end;
        }
        .paper-row.seq-far .pline { flex-grow: 1; order: 1; }
        .paper-row.seq-far .pcard { flex-shrink: 0; max-width: 200px; order: 2; }

        /* ── Branch line colours by card type ── */

        /* Amplification: golden yellow */
        .paper-row.img-near.amplification .pline { background: rgba(212,184,0,0.55); height: 1px; }
        .paper-row.img-far.amplification  .pline { background: linear-gradient(to right, transparent, rgba(212,184,0,0.38)); height: 1px; }

        /* Hybridisation: soft purple */
        .paper-row.img-near.hybridisation .pline { background: rgba(155,127,212,0.55); height: 1px; }
        .paper-row.img-far.hybridisation  .pline { background: linear-gradient(to right, transparent, rgba(155,127,212,0.38)); height: 1px; }

        /* Sequencing: neutral gray */
        .paper-row.seq-near.sequencing .pline { background: rgba(150,150,150,0.45); height: 1px; }
        .paper-row.seq-far.sequencing  .pline { background: linear-gradient(to left, transparent, rgba(150,150,150,0.35)); height: 1px; }

        /* ── Paper cards ── */
        .pcard {
            border-radius: 5px;
            padding: 6px 10px 7px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            transition: box-shadow 0.18s;
            min-width: 0;
        }
        .pcard:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.10); }

        /* Uniform border — no thick left border */
        .pcard.amplification {
            background: #fffce8;
            border: 1.5px solid #d4b800;
        }
        .pcard.hybridisation {
            background: #f8f3ff;
            border: 1.5px solid #9b7fd4;
        }
        .pcard.sequencing {
            background: #ffffff;
            border: 1.5px solid #c8c8c8;
        }

        .paper-method {
            font-weight: 600; font-size: 11.5px; color: #111;
            margin-bottom: 2px; line-height: 1.3;
        }
        .paper-author {
            font-size: 10px; color: #aaa; margin-bottom: 3px;
        }
        .paper-doi {
            display: block;
            font-size: 10px;
            text-decoration: none; word-break: break-all;
            opacity: 0.75; transition: opacity 0.2s;
        }
        .pcard.amplification .paper-doi { color: #a08000; }
        .pcard.hybridisation .paper-doi { color: #7a5bc4; }
        .pcard.sequencing    .paper-doi { color: #666; }
        .paper-doi:hover { opacity: 1; text-decoration: underline; }

        /* ── Responsive ── */
        @media (max-width: 720px) {
            #navbar { padding: 14px 18px; }
            #timeline-wrap { padding: 0 12px 60px; }
            #timeline-grid { grid-template-columns: 1fr 52px 1fr; }
            .pcard { font-size: 10px; }
            .paper-row.img-near, .paper-row.img-far,
            .paper-row.seq-near, .paper-row.seq-far { padding-left: 0; padding-right: 0; }
            .paper-row.img-near .pcard,
            .paper-row.img-far  .pcard,
            .paper-row.seq-near .pcard,
            .paper-row.seq-far  .pcard { max-width: 130px; }
            .year-dot { width: 40px; height: 40px; font-size: 8.5px; }
        }
    </style>
</head>
<body>

<!-- NAV -->
<nav id="navbar">
    <a href="index.html" class="nav-logo">KU</a>
    <div class="nav-links">
        <a href="intro.html">Intro</a>
        <a href="spatialomics.html" class="active">Spatial Omics</a>
        <a href="index.html#cv">CV</a>
    </div>
</nav>

<!-- PAGE HEADER -->
<div id="page-header">
    <h1>Spatial Transcriptomics</h1>
    <div class="legend">
        <span class="legend-item"><span class="legend-swatch amp"></span>Amplification</span>
        <span class="legend-item"><span class="legend-swatch hybr"></span>Hybridisation</span>
        <span class="legend-item"><span class="legend-swatch seq"></span>Sequencing</span>
    </div>
</div>

<!-- LOADING -->
<div id="status"><span class="spinner"></span> Loading from spreadsheet…</div>

<!-- TIMELINE -->
<div id="timeline-wrap">
    <div id="timeline-grid"></div>
</div>

<script>
// ═══════════════════════════════════
//  CONFIG
// ═══════════════════════════════════
var SHEET_ID = '1GDGEbKghH3nxXYz98v8coWwhkBjoq7izMQlkgM1wEV8';
var GVIZ_URL = 'https://docs.google.com/spreadsheets/d/'
             + SHEET_ID + '/gviz/tq?tqx=out:json';

// ═══════════════════════════════════
//  HELPERS
// ═══════════════════════════════════
function parseYear(cell) {
    if (!cell || cell.v == null) return null;
    if (cell.f) {
        var m = String(cell.f).match(/\d{4}/);
        if (m) return parseInt(m[0]);
    }
    if (typeof cell.v === 'string') {
        var dm = cell.v.match(/Date\((\d{4})/);
        if (dm) return parseInt(dm[1]);
    }
    var n = parseInt(cell.v);
    return (!isNaN(n) && n > 1900 && n < 2200) ? n : null;
}

function cellStr(cell) {
    return (cell && cell.v != null) ? String(cell.v).trim() : '';
}

function esc(s) {
    return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════
//  RENDER one paper card
// ═══════════════════════════════════
function paperCard(p) {
    var doi        = p.doi;
    var doiDisplay = doi.replace(/^https?:\/\/(dx\.)?doi\.org\//i, '');
    return '<div class="pcard ' + p.cardType + '">'
         + '<div class="paper-method">' + esc(p.method) + '</div>'
         + (p.author ? '<div class="paper-author">' + esc(p.author) + '</div>' : '')
         + (doi ? '<a class="paper-doi" href="' + doi.replace(/"/g,'%22') + '"'
                + ' target="_blank" rel="noopener">' + esc(doiDisplay) + '</a>' : '')
         + '</div>';
}

// ═══════════════════════════════════
//  BUILD TIMELINE
// ═══════════════════════════════════
function buildTimeline(rows) {
    // Split imaging vs sequencing for column placement
    var imgRows = rows.filter(function(r) { return r.methodType.toLowerCase() === 'imaging'; });
    var seqRows = rows.filter(function(r) { return r.methodType.toLowerCase() === 'sequencing'; });

    function groupByYear(list) {
        var map = {};
        list.forEach(function(r) {
            var y = r.year || 'unknown';
            if (!map[y]) map[y] = [];
            map[y].push(r);
        });
        return map;
    }

    var imgByYear = groupByYear(imgRows);
    var seqByYear = groupByYear(seqRows);

    // Collect all years
    var yearSet = {};
    [imgByYear, seqByYear].forEach(function(m) {
        Object.keys(m).forEach(function(y) { if (y !== 'unknown') yearSet[y] = true; });
    });
    // Sort DESCENDING: newest at top
    var years = Object.keys(yearSet).map(Number).sort(function(a,b){ return b - a; });

    // Render papers for one column side ('img' or 'seq')
    function renderPapers(papers, side) {
        var near = papers.filter(function(p) { return p.isNear; });
        var far  = papers.filter(function(p) { return !p.isNear; });
        var html = '';

        near.forEach(function(p) {
            html += '<div class="paper-row ' + side + '-near ' + p.cardType + '">'
                  + paperCard(p)
                  + '<div class="pline"></div>'
                  + '</div>';
        });
        far.forEach(function(p) {
            html += '<div class="paper-row ' + side + '-far ' + p.cardType + '">'
                  + paperCard(p)
                  + '<div class="pline"></div>'
                  + '</div>';
        });
        return html;
    }

    // Column header labels (first row in the grid)
    var html = '<div class="col-header img-header">Imaging-based</div>'
             + '<div class="col-header-spacer"></div>'
             + '<div class="col-header seq-header">Sequencing-based</div>';

    years.forEach(function(year, idx) {
        var isFirst = idx === 0;
        var isLast  = idx === years.length - 1;
        var yKey    = String(year);

        var imgPapers = imgByYear[yKey] || [];
        var seqPapers = seqByYear[yKey] || [];

        // Imaging cell (col 1)
        html += '<div class="papers-cell img-col">'
              + renderPapers(imgPapers, 'img')
              + '</div>';

        // Year axis cell (col 2)
        html += '<div class="year-cell'
              + (isFirst ? ' first' : '')
              + (isLast  ? ' last'  : '') + '">'
              + '<div class="year-dot">' + year + '</div>'
              + '</div>';

        // Sequencing cell (col 3)
        html += '<div class="papers-cell seq-col">'
              + renderPapers(seqPapers, 'seq')
              + '</div>';
    });

    document.getElementById('timeline-grid').innerHTML = html;
    document.getElementById('timeline-wrap').style.display = 'block';
}

// ═══════════════════════════════════
//  FETCH
// ═══════════════════════════════════
fetch(GVIZ_URL)
    .then(function(r) { return r.text(); })
    .then(function(text) {
        var start = text.indexOf('(') + 1;
        var end   = text.lastIndexOf(')');
        if (start <= 0 || end <= start) throw new Error('Could not parse response');

        var data = JSON.parse(text.substring(start, end));
        var cols = data.table.cols.map(function(c) { return c.label; });

        var rows = (data.table.rows || [])
            .filter(function(r) { return r && r.c; })
            .map(function(r) {
                var get = function(label) { return r.c[cols.indexOf(label)] || null; };
                var mt  = cellStr(get('Method type')).toLowerCase();
                var it  = cellStr(get('Imaging type')).toLowerCase();
                var tag = cellStr(get('Tag'));

                // Determine card colour type
                var cardType;
                if (mt === 'imaging') {
                    if (it === 'amplification')  cardType = 'amplification';
                    else if (it === 'hybridisation') cardType = 'hybridisation';
                    else cardType = 'amplification'; // fallback for untyped imaging
                } else {
                    cardType = 'sequencing';
                }

                return {
                    year:       parseYear(get('Date published')),
                    doi:        cellStr(get('Link')),
                    author:     cellStr(get('First author')),
                    method:     cellStr(get('Method')),
                    methodType: mt,
                    cardType:   cardType,
                    tag:        tag,
                    isNear:     /breakthrough|original/i.test(tag)
                };
            })
            .filter(function(r) { return r.method && r.methodType; });

        document.getElementById('status').style.display = 'none';
        buildTimeline(rows);
    })
    .catch(function(err) {
        var s = document.getElementById('status');
        s.className = 'error';
        s.innerHTML = '&#9888; Could not load data.<br>'
            + '<small>Make sure the Google Sheet is shared as "Anyone with the link can view".</small><br>'
            + '<small style="opacity:0.6">' + esc(err.message) + '</small>';
    });

// Navbar scroll tint
window.addEventListener('scroll', function() {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40);
});
</script>

</body>
</html>
