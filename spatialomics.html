<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spatial Omics — Karen Uchida</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            background: #fafafa;
            color: #111;
            font-family: 'Montserrat', Arial, sans-serif;
            font-size: 14px;
            line-height: 1.6;
        }

        /* ── NAV ── */
        #navbar {
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 48px;
            background: transparent;
            transition: background 0.3s, box-shadow 0.3s;
        }
        #navbar.scrolled {
            background: rgba(255,255,255,0.94);
            backdrop-filter: blur(10px);
            box-shadow: 0 1px 0 #e8e8e8;
        }
        .nav-logo { color: #ff6600; font-size: 17px; font-weight: 600; letter-spacing: 0.1em; text-decoration: none; }
        .nav-links { display: flex; gap: 28px; }
        .nav-links a {
            color: #111; text-decoration: none; font-size: 12px;
            letter-spacing: 0.12em; text-transform: uppercase;
            opacity: 0.45; transition: opacity 0.2s;
        }
        .nav-links a:hover, .nav-links a.active { opacity: 1; color: #ff6600; }

        /* ── PAGE HEADER ── */
        #page-header {
            text-align: center;
            padding: 60px 24px 28px;
        }
        #page-header h1 {
            font-size: clamp(1.4rem, 3.5vw, 2rem);
            font-weight: 300; color: #ff6600;
            letter-spacing: 0.2em; text-transform: uppercase;
            margin-bottom: 10px;
        }
        #page-header p {
            color: #bbb; font-size: 11px;
            letter-spacing: 0.12em;
            margin-bottom: 18px;
        }

        /* Legend */
        .legend {
            display: inline-flex;
            gap: 20px;
            align-items: center;
            font-size: 11px;
            letter-spacing: 0.08em;
            color: #888;
        }
        .legend-dot {
            display: inline-block;
            width: 10px; height: 10px;
            border-radius: 2px;
            margin-right: 5px;
            vertical-align: middle;
        }
        .legend-dot.img  { background: #f5d84a; }
        .legend-dot.seq  { background: #7bc8f5; }

        /* ── STATUS ── */
        #status {
            text-align: center; padding: 60px 24px;
            color: #aaa; font-size: 12px; letter-spacing: 0.08em;
        }
        #status.error { color: #c0392b; }
        .spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 2px solid #eee; border-top-color: #ff6600;
            border-radius: 50%; animation: spin 0.7s linear infinite;
            vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ══════════════════════════════════════════
           TIMELINE LAYOUT
           3 columns: [imaging] [year-axis] [sequencing]
           align-items: stretch so year-axis cells are
           full row height → vertical line is continuous.
           Paper cells use align-self: start.
           ══════════════════════════════════════════ */
        #timeline-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px 100px;
            display: none;
        }

        #timeline-grid {
            display: grid;
            grid-template-columns: 1fr 72px 1fr;
            gap: 0;
            align-items: stretch;
        }

        /* ── Year axis cell ── */
        .year-cell {
            grid-column: 2;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 12px;
            /* stretch fills full row height → line is continuous */
        }

        /* Vertical orange connecting line */
        .year-cell::before {
            content: '';
            position: absolute;
            left: 50%; transform: translateX(-50%);
            top: 0; bottom: 0;
            width: 2px;
            background: rgba(255,102,0,0.22);
            z-index: 0;
        }
        .year-cell.first::before { top: 38px; }
        .year-cell.last::before  { bottom: auto; height: 38px; }

        /* Faint horizontal tick at dot centre, extends into paper columns */
        .year-cell::after {
            content: '';
            position: absolute;
            left: -16px; right: -16px;
            top: 38px; /* padding(12) + radius(26) */
            height: 1px;
            background: rgba(255,102,0,0.12);
            z-index: 0;
        }

        /* Year circle */
        .year-dot {
            position: relative; z-index: 1;
            width: 52px; height: 52px;
            border-radius: 50%;
            background: #ff6600;
            color: #fff;
            font-size: 10px; font-weight: 600;
            letter-spacing: 0.02em;
            display: flex; align-items: center; justify-content: center;
            text-align: center; line-height: 1.25;
            box-shadow: 0 2px 10px rgba(255,102,0,0.28);
            flex-shrink: 0;
        }

        /* ── Paper columns ── */
        .papers-cell {
            align-self: start;
            padding: 8px 0 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* Each paper row: card + branch line */
        .paper-row {
            display: flex;
            align-items: center;
            min-width: 0;
            margin-bottom: 4px;
        }

        /* ─────────────────────────────────────────
           IMAGING (left column)
           Near (tagged): card pushed RIGHT + short line pointing right toward axis
           Far (non-tagged): card on LEFT + long fading line growing right toward axis
           ───────────────────────────────────────── */
        .img-col { padding-right: 4px; }

        .paper-row.img-near {
            justify-content: flex-end; /* push card to right */
        }
        .paper-row.img-near .pline {
            width: 16px;
            height: 1px;
            background: rgba(200,160,0,0.5);
            flex-shrink: 0;
            order: 2; /* line AFTER card (on the right) */
        }
        .paper-row.img-near .pcard { order: 1; }

        .paper-row.img-far {
            justify-content: flex-start; /* card on left */
        }
        .paper-row.img-far .pcard { flex-shrink: 0; order: 1; }
        .paper-row.img-far .pline {
            flex-grow: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(200,160,0,0.35));
            order: 2;
        }

        /* ─────────────────────────────────────────
           SEQUENCING (right column)
           Near (tagged): short line on LEFT + card pushed left toward axis
           Far (non-tagged): long fading line grows left + card on RIGHT
           ───────────────────────────────────────── */
        .seq-col { padding-left: 4px; }

        .paper-row.seq-near {
            justify-content: flex-start; /* card on left */
        }
        .paper-row.seq-near .pline {
            width: 16px;
            height: 1px;
            background: rgba(60,140,200,0.5);
            flex-shrink: 0;
            order: 1; /* line BEFORE card (on the left) */
        }
        .paper-row.seq-near .pcard { order: 2; }

        .paper-row.seq-far {
            justify-content: flex-end; /* card on right */
        }
        .paper-row.seq-far .pline {
            flex-grow: 1;
            height: 1px;
            background: linear-gradient(to left, transparent, rgba(60,140,200,0.35));
            order: 1;
        }
        .paper-row.seq-far .pcard { flex-shrink: 0; order: 2; }

        /* ── Paper cards ── */
        .pcard {
            border-radius: 5px;
            padding: 6px 10px 7px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            transition: box-shadow 0.18s;
            min-width: 0;
            max-width: 260px; /* prevent cards getting too wide */
        }
        .pcard:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.10); }

        /* Imaging card colours */
        .pcard.imaging {
            background: #fffce8;
            border: 1px solid #f0d940;
            border-left: 2.5px solid #d4b800;
        }

        /* Sequencing card colours */
        .pcard.sequencing {
            background: #eef6ff;
            border: 1px solid #a6d4f5;
            border-left: 2.5px solid #4da6e0;
        }

        /* Near cards: slightly more prominent */
        .pcard.near {
            box-shadow: 0 2px 8px rgba(0,0,0,0.09);
        }

        /* Far cards: slightly lighter */
        .pcard.far {
            opacity: 0.85;
        }

        .paper-method {
            font-weight: 600; font-size: 11.5px; color: #111;
            margin-bottom: 2px; line-height: 1.3;
        }
        .paper-author {
            font-size: 10px; color: #aaa; margin-bottom: 3px;
        }
        .paper-doi {
            display: block;
            font-size: 10px;
            text-decoration: none; word-break: break-all;
            opacity: 0.75; transition: opacity 0.2s;
        }
        .pcard.imaging  .paper-doi { color: #b09000; }
        .pcard.sequencing .paper-doi { color: #2a86c0; }
        .paper-doi:hover { opacity: 1; text-decoration: underline; }

        /* ── Responsive ── */
        @media (max-width: 720px) {
            #navbar { padding: 14px 18px; }
            #timeline-wrap { padding: 0 12px 60px; }
            #timeline-grid { grid-template-columns: 1fr 56px 1fr; }
            .pcard { max-width: 160px; font-size: 10px; }
            .year-dot { width: 42px; height: 42px; font-size: 9px; }
            .year-cell::before { }
            .year-cell::after { left: -10px; right: -10px; }
            .paper-row.img-near .pline,
            .paper-row.seq-near .pline { width: 10px; }
        }
    </style>
</head>
<body>

<!-- NAV -->
<nav id="navbar">
    <a href="index.html" class="nav-logo">KU</a>
    <div class="nav-links">
        <a href="intro.html">Intro</a>
        <a href="spatialomics.html" class="active">Spatial Omics</a>
        <a href="index.html#cv">CV</a>
    </div>
</nav>

<!-- PAGE HEADER -->
<div id="page-header">
    <h1>Spatial Transcriptomics</h1>
    <p>Auto-updating timeline · sourced live from the research spreadsheet</p>
    <div class="legend">
        <span><span class="legend-dot img"></span>Imaging</span>
        <span><span class="legend-dot seq"></span>Sequencing</span>
    </div>
</div>

<!-- LOADING -->
<div id="status"><span class="spinner"></span> Loading from spreadsheet…</div>

<!-- TIMELINE -->
<div id="timeline-wrap">
    <div id="timeline-grid"></div>
</div>

<script>
// ═══════════════════════════════════
//  CONFIG
// ═══════════════════════════════════
var SHEET_ID = '1GDGEbKghH3nxXYz98v8coWwhkBjoq7izMQlkgM1wEV8';
var GVIZ_URL = 'https://docs.google.com/spreadsheets/d/'
             + SHEET_ID + '/gviz/tq?tqx=out:json';

// ═══════════════════════════════════
//  HELPERS
// ═══════════════════════════════════
function parseYear(cell) {
    if (!cell || cell.v == null) return null;
    if (cell.f) {
        var m = String(cell.f).match(/\d{4}/);
        if (m) return parseInt(m[0]);
    }
    if (typeof cell.v === 'string') {
        var dm = cell.v.match(/Date\((\d{4})/);
        if (dm) return parseInt(dm[1]);
    }
    var n = parseInt(cell.v);
    return (!isNaN(n) && n > 1900 && n < 2200) ? n : null;
}

function cellStr(cell) {
    return (cell && cell.v != null) ? String(cell.v).trim() : '';
}

function esc(s) {
    return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════
//  RENDER one paper card
// ═══════════════════════════════════
function paperCard(p, typeClass, nearClass) {
    var doi        = p.doi;
    var doiDisplay = doi.replace(/^https?:\/\/(dx\.)?doi\.org\//i, '');
    return '<div class="pcard ' + typeClass + ' ' + nearClass + '">'
         + '<div class="paper-method">' + esc(p.method) + '</div>'
         + (p.author ? '<div class="paper-author">' + esc(p.author) + '</div>' : '')
         + (doi ? '<a class="paper-doi" href="' + doi.replace(/"/g,'%22') + '"'
                + ' target="_blank" rel="noopener">' + esc(doiDisplay) + '</a>' : '')
         + '</div>';
}

// ═══════════════════════════════════
//  BUILD TIMELINE
// ═══════════════════════════════════
function buildTimeline(rows) {
    // Separate imaging vs sequencing
    var imgRows = rows.filter(function(r) { return r.methodType.toLowerCase() === 'imaging'; });
    var seqRows = rows.filter(function(r) { return r.methodType.toLowerCase() === 'sequencing'; });

    function groupByYear(list) {
        var map = {};
        list.forEach(function(r) {
            var y = r.year || 'unknown';
            if (!map[y]) map[y] = [];
            map[y].push(r);
        });
        return map;
    }

    var imgByYear = groupByYear(imgRows);
    var seqByYear = groupByYear(seqRows);

    // Collect all years
    var yearSet = {};
    [imgByYear, seqByYear].forEach(function(m) {
        Object.keys(m).forEach(function(y) { if (y !== 'unknown') yearSet[y] = true; });
    });
    var years = Object.keys(yearSet).map(Number).sort(function(a,b){ return a - b; });

    function renderPapers(papers, side) {
        // near (tagged) first, far (non-tagged) second
        var near = papers.filter(function(p) { return p.isNear; });
        var far  = papers.filter(function(p) { return !p.isNear; });
        var html = '';

        near.forEach(function(p) {
            html += '<div class="paper-row ' + side + '-near">'
                  + paperCard(p, side === 'img' ? 'imaging' : 'sequencing', 'near')
                  + '<div class="pline"></div>'
                  + '</div>';
        });
        far.forEach(function(p) {
            html += '<div class="paper-row ' + side + '-far">'
                  + paperCard(p, side === 'img' ? 'imaging' : 'sequencing', 'far')
                  + '<div class="pline"></div>'
                  + '</div>';
        });
        return html;
    }

    var html = '';
    years.forEach(function(year, idx) {
        var isFirst = idx === 0;
        var isLast  = idx === years.length - 1;
        var yKey    = String(year);

        var imgPapers = imgByYear[yKey] || [];
        var seqPapers = seqByYear[yKey] || [];

        // Imaging cell (col 1)
        html += '<div class="papers-cell img-col">'
              + renderPapers(imgPapers, 'img')
              + '</div>';

        // Year axis cell (col 2)
        html += '<div class="year-cell'
              + (isFirst ? ' first' : '')
              + (isLast  ? ' last'  : '') + '">'
              + '<div class="year-dot">' + year + '</div>'
              + '</div>';

        // Sequencing cell (col 3)
        html += '<div class="papers-cell seq-col">'
              + renderPapers(seqPapers, 'seq')
              + '</div>';
    });

    document.getElementById('timeline-grid').innerHTML = html;
    document.getElementById('timeline-wrap').style.display = 'block';
}

// ═══════════════════════════════════
//  FETCH
// ═══════════════════════════════════
fetch(GVIZ_URL)
    .then(function(r) { return r.text(); })
    .then(function(text) {
        var start = text.indexOf('(') + 1;
        var end   = text.lastIndexOf(')');
        if (start <= 0 || end <= start) throw new Error('Could not parse response');

        var data = JSON.parse(text.substring(start, end));
        var cols = data.table.cols.map(function(c) { return c.label; });

        var rows = (data.table.rows || [])
            .filter(function(r) { return r && r.c; })
            .map(function(r) {
                var get = function(label) { return r.c[cols.indexOf(label)] || null; };
                var tag = cellStr(get('Tag'));
                return {
                    year:        parseYear(get('Date published')),
                    doi:         cellStr(get('Link')),
                    author:      cellStr(get('First author')),
                    method:      cellStr(get('Method')),
                    methodType:  cellStr(get('Method type')),
                    imagingType: cellStr(get('Imaging type')),
                    tag:         tag,
                    isNear:      /breakthrough|original/i.test(tag)
                };
            })
            .filter(function(r) { return r.method && r.methodType; });

        rows.sort(function(a, b) {
            if (a.year == null && b.year == null) return 0;
            if (a.year == null) return  1;
            if (b.year == null) return -1;
            return a.year - b.year;
        });

        document.getElementById('status').style.display = 'none';
        buildTimeline(rows);
    })
    .catch(function(err) {
        var s = document.getElementById('status');
        s.className = 'error';
        s.innerHTML = '&#9888; Could not load data.<br>'
            + '<small>Make sure the Google Sheet is shared as "Anyone with the link can view".</small><br>'
            + '<small style="opacity:0.6">' + esc(err.message) + '</small>';
    });

// Navbar scroll tint
window.addEventListener('scroll', function() {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40);
});
</script>

</body>
</html>
