<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Globe Test — Karen Uchida</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* tall wrapper creates the scroll space */
        #globe-wrapper {
            height: 900vh;
            position: relative;
        }

        /* canvas sticks to the viewport as user scrolls */
        #globe-canvas {
            position: sticky;
            top: 0;
            width: 100%;
            height: 100vh;
            display: block;
        }

        /* location label — bottom centre */
        #location-label {
            position: fixed;
            bottom: 56px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 102, 0, 0.5);
            padding: 8px 28px;
            border-radius: 99px;
            backdrop-filter: blur(10px);
            transition: opacity 0.4s ease;
            white-space: nowrap;
            pointer-events: none;
        }

        /* scroll hint */
        #scroll-hint {
            position: fixed;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.35);
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: opacity 0.6s;
            pointer-events: none;
        }

        /* progress bar at top */
        #progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 2px;
            background: #ff6600;
            width: 0%;
            transition: width 0.1s;
            z-index: 10;
        }

        /* back link */
        #back-link {
            position: fixed;
            top: 20px;
            left: 24px;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-decoration: none;
            transition: color 0.2s;
            z-index: 10;
        }
        #back-link:hover { color: #ff6600; }
    </style>
</head>
<body>

    <div id="globe-wrapper">
        <canvas id="globe-canvas"></canvas>
    </div>

    <div id="location-label">Yokohama, Japan</div>
    <div id="scroll-hint">↓ scroll to travel</div>
    <div id="progress-bar"></div>
    <a href="index.html" id="back-link">← Back</a>

    <!-- Three.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.min.js"></script>

    <script>
    // ─────────────────────────────────────────────
    //  SCENE SETUP
    // ─────────────────────────────────────────────
    const canvas   = document.getElementById('globe-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 0, 3.0); // start zoomed in on Yokohama

    // ─────────────────────────────────────────────
    //  STARS
    // ─────────────────────────────────────────────
    const starCount = 8000;
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount * 3; i++) {
        starPositions[i] = (Math.random() - 0.5) * 300;
    }
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const stars = new THREE.Points(
        starGeo,
        new THREE.PointsMaterial({ color: 0xffffff, size: 0.18, sizeAttenuation: true })
    );
    scene.add(stars);

    // ─────────────────────────────────────────────
    //  EARTH
    // ─────────────────────────────────────────────
    const earthGeo = new THREE.SphereGeometry(1, 64, 64);
    const loader   = new THREE.TextureLoader();

    // Blue Marble texture from jsDelivr (same CDN as font-awesome)
    const earthTexture = loader.load(
        'https://cdn.jsdelivr.net/npm/three-globe@2/example/img/earth-blue-marble.jpg'
    );

    const earthMat = new THREE.MeshPhongMaterial({
        map:       earthTexture,
        shininess: 18,
        specular:  new THREE.Color(0x334466),
    });
    const earth = new THREE.Mesh(earthGeo, earthMat);
    scene.add(earth);

    // ─────────────────────────────────────────────
    //  ATMOSPHERE GLOW
    // ─────────────────────────────────────────────
    const atmGeo = new THREE.SphereGeometry(1.08, 64, 64);
    const atmMat = new THREE.MeshBasicMaterial({
        color:       0x1a5cff,
        transparent: true,
        opacity:     0.10,
        side:        THREE.BackSide,
    });
    scene.add(new THREE.Mesh(atmGeo, atmMat));

    // ─────────────────────────────────────────────
    //  LIGHTING
    // ─────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.35));

    const sun = new THREE.DirectionalLight(0xfff5e0, 1.3);
    sun.position.set(5, 3, 4);
    scene.add(sun);

    // ─────────────────────────────────────────────
    //  LOCATION MARKERS  (children of earth → rotate with it)
    // ─────────────────────────────────────────────
    const MARKER_LOCATIONS = [
        { lat: 35.44, lng: 139.64 }, // Yokohama
        { lat: 28.46, lng: 77.03  }, // Gurgaon
        { lat: 51.51, lng: -0.13  }, // London
        { lat: 52.21, lng: 0.12   }, // Cambridge
        { lat: 52.63, lng: 1.30   }, // Norwich
    ];

    // Convert lat/lng to 3D point ON the sphere surface (local space)
    // Three.js SphereGeometry formula:
    //   phi   = (lng + 180) / 360 * 2π  (azimuthal, around Y)
    //   theta = (90 - lat) / 180 * π    (polar, from top)
    //   x = -cos(phi) * sin(theta)
    //   y =  cos(theta)
    //   z =  sin(phi) * sin(theta)
    function latLngTo3D(lat, lng, radius) {
        const phi   = ((lng + 180) / 360) * 2 * Math.PI;
        const theta = ((90 - lat) / 180) * Math.PI;
        return new THREE.Vector3(
            -radius * Math.cos(phi) * Math.sin(theta),
             radius * Math.cos(theta),
             radius * Math.sin(phi) * Math.sin(theta)
        );
    }

    MARKER_LOCATIONS.forEach(loc => {
        const pos = latLngTo3D(loc.lat, loc.lng, 1.015);

        // glowing dot
        const dot = new THREE.Mesh(
            new THREE.SphereGeometry(0.012, 16, 16),
            new THREE.MeshBasicMaterial({ color: 0xff6600 })
        );
        dot.position.copy(pos);
        earth.add(dot);

        // subtle halo ring around the dot
        const ring = new THREE.Mesh(
            new THREE.SphereGeometry(0.022, 16, 16),
            new THREE.MeshBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0.25 })
        );
        ring.position.copy(pos);
        earth.add(ring);
    });

    // ─────────────────────────────────────────────
    //  JOURNEY WAYPOINTS
    //  Each step has: label, lat, lng, dist (camera Z)
    //  Same lat/lng but different dist = zoom in/out
    // ─────────────────────────────────────────────
    const WAYPOINTS = [
        { name: "Yokohama, Japan",  lat: 35.44, lng: 139.64, dist: 3.0 }, // 0  zoom in
        { name: "Yokohama, Japan",  lat: 35.44, lng: 139.64, dist: 3.8 }, // 1  zoom out
        { name: "Gurgaon, India",   lat: 28.46, lng: 77.03,  dist: 3.0 }, // 2  fly + zoom in
        { name: "Gurgaon, India",   lat: 28.46, lng: 77.03,  dist: 3.8 }, // 3  zoom out
        { name: "Yokohama, Japan",  lat: 35.44, lng: 139.64, dist: 3.0 }, // 4  fly back + zoom in
        { name: "Yokohama, Japan",  lat: 35.44, lng: 139.64, dist: 3.8 }, // 5  zoom out
        { name: "London, UK",       lat: 51.51, lng: -0.13,  dist: 3.0 }, // 6  fly + zoom in
        { name: "Cambridge, UK",    lat: 52.21, lng: 0.12,   dist: 3.2 }, // 7  fly
        { name: "Norwich, UK",      lat: 52.63, lng: 1.30,   dist: 3.2 }, // 8  fly
        { name: "Norwich, UK",      lat: 52.63, lng: 1.30,   dist: 3.2 }, // 9  hold at end
    ];

    // Quaternion that rotates the sphere so (lat, lng) faces the camera at +Z
    function targetQuaternion(lat, lng) {
        const surfacePoint = latLngTo3D(lat, lng, 1.0);
        const front = new THREE.Vector3(0, 0, 1);
        return new THREE.Quaternion().setFromUnitVectors(
            surfacePoint.normalize(),
            front
        );
    }

    // Pre-compute all target quaternions
    const QUATS = WAYPOINTS.map(wp => targetQuaternion(wp.lat, wp.lng));

    // ─────────────────────────────────────────────
    //  SCROLL PROGRESS  (0 → 1)
    // ─────────────────────────────────────────────
    function getProgress() {
        const wrapper  = document.getElementById('globe-wrapper');
        const maxScroll = wrapper.offsetHeight - window.innerHeight;
        return Math.max(0, Math.min(1, window.scrollY / maxScroll));
    }

    // Smooth ease-in-out per segment
    function easeInOut(t) {
        return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    }

    // ─────────────────────────────────────────────
    //  LABEL
    // ─────────────────────────────────────────────
    const label     = document.getElementById('location-label');
    const scrollHint = document.getElementById('scroll-hint');
    let currentLabel = WAYPOINTS[0].name;
    let labelFading  = false;

    function setLabel(name) {
        if (name === currentLabel || labelFading) return;
        labelFading = true;
        label.style.opacity = '0';
        setTimeout(() => {
            label.textContent = name;
            currentLabel = name;
            label.style.opacity = '1';
            labelFading = false;
        }, 350);
    }

    // Fade out scroll hint after first scroll
    window.addEventListener('scroll', () => {
        if (window.scrollY > 50) scrollHint.style.opacity = '0';
    }, { once: true });

    // ─────────────────────────────────────────────
    //  ANIMATION LOOP
    // ─────────────────────────────────────────────
    function animate() {
        requestAnimationFrame(animate);

        const progress     = getProgress();
        const numSegments  = WAYPOINTS.length - 1;
        const rawSeg       = progress * numSegments;
        const segIdx       = Math.min(Math.floor(rawSeg), numSegments - 1);
        const t            = easeInOut(rawSeg - segIdx);

        const wp1 = WAYPOINTS[segIdx];
        const wp2 = WAYPOINTS[segIdx + 1];

        // ── Sphere rotation (slerp between the two target quaternions) ──
        const q = new THREE.Quaternion();
        q.slerpQuaternions(QUATS[segIdx], QUATS[segIdx + 1], t);
        earth.quaternion.copy(q);

        // ── Camera zoom (lerp distance along Z) ──
        camera.position.z = wp1.dist + (wp2.dist - wp1.dist) * t;
        camera.lookAt(0, 0, 0);

        // ── Progress bar ──
        document.getElementById('progress-bar').style.width = (progress * 100) + '%';

        // ── Location label ──
        const shownLabel = t < 0.5 ? wp1.name : wp2.name;
        setLabel(shownLabel);

        // ── Slow idle star rotation ──
        stars.rotation.y += 0.00008;

        renderer.render(scene, camera);
    }

    animate();

    // ─────────────────────────────────────────────
    //  RESIZE
    // ─────────────────────────────────────────────
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
    </script>

</body>
</html>
